lanes:
- id: '1'
  label: Lane 1
  ordinal: 1
  kind: progress
  title: Targeted hypothesis pursuit
  north_star: true
  purpose: >-
    Go directly after specific, named flagship hypotheses and drive each toward a verdict — the
    high-exploit / North-Star work. The directed lane: pick the biggest bets and push them hard.
  purpose_type: north_star
  lead_bet: >-
    The single MOST IMPORTANT thing in this lane is the NATIVE Λ~1/√N scaling of the record count N
    (channel 1.3) — the one genuinely-native, cross-route-consilient result. The tachyon-transducer
    (1.1) and the B5 source action (1.2) are routes toward SOURCING its still-imported O(1)
    coefficient. Broad in admission, anchored in priority.
  anchor:
    name: Λ~1/√N — the native scaling of the record count N (the Lane-1 North-Star anchor)
    elevated: '2026-07-21 (Joe direct chat)'
    why: >-
      It converts the worst fine-tuning in physics — Λ ~ 10^-120 in Planck units — into "N is large"
      (N = spacetime 4-volume in Planck units ~ 10^240; 1/√(10^240) = 10^-120): the cosmological-
      constant fine-tuning DISSOLVES into a finite-N statistical (central-limit / LLN-residual)
      fluctuation. It is the one place the program already turns a notorious impossibility into
      arithmetic, and the object all other threads converge on — the record count N seen four ways:
      its fluctuation is dark energy, its growth is becoming (the roll), its finality-structure is
      measurement, its causal order is spacetime.
    honest_standing: >-
      BANKED: the ½ EXPONENT is native and consilient (two wave-1 routes — DeWitt-fiber + Bianconi-
      entropy — plus Sorkin's causal-set fluctuation). OPEN: the O(1) COEFFICIENT is NOT yet sourced.
      The R1-R7 test wave (2026-07-21) sharpened why: R6b — the Λ↔N loop pins Ω_Λ only via one tuned
      knob (generic O(1) ~0.7-0.8; the 120-order fine-tuning is GONE, but 0.68 needs tuning); R6a — a
      set-point-free SOC controller SOURCES the exponent + critical point (the "must import a set-point"
      wall falls) but is SCALE-FREE, so it cannot output a magnitude, and non-additivity (what a sourced
      count needs) is in TENSION with a self-averaging 1/√N (non-additive gives a heavy-tailed 3/2; 1/√N
      returns only under additive counting = the wave-1 import). The SIGN stays the external σ bit. Do
      NOT state "Λ~1/√N is derived" flatly — the exponent is, the value is not.
    live_target: >-
      Source the O(1) coefficient via a SECOND, self-sourced scale-fixing ingredient. Concrete
      candidate: dimensional-transmutation-style scale-generation tied to the D-spectral gap (QCD
      precedent — a scale-free theory self-generates ΛQCD with no imported scale). This is downstream
      of the same B5 source-action / source-internal-MINT bottleneck all five R-tests converge on
      (rtest-wave-synthesis-2026-07-21.md); type-III (modular/KMS) source-selection and the neural-
      scaling spectral-dimension lead are the adjacent routes to the same sourced scale.
  priority_guard: >-
    SWING-DU-COV-02 kills the strongest local constant-kappa lift except at the constant-Lambda
    limit: every accelerating fixed point has c_N^2=3 Omega_V*>1. SWING-DU-CMF-01 then executes the
    class-relative escape rather than globalizing that no-go. Literal causal-past volume, a
    metric-null bi-wave proxy and an order-first signed martingale are retarded and do not inherit
    the local superluminal characteristic. They fail one level deeper: every built scale-free
    positive memory tracks radiation/matter or does not accelerate; late calibration makes the
    early fraction order one; the raw martingale is too noisy early, rarely preserves a positive
    sign, and has no stationary de Sitter limit. Outcome: CAUSAL_ESCAPE_TRACKER_FAIL. A fitted
    offset/window is REIMPORTS_COSMIC_CLOCK. Further coefficient or kernel tuning does not count as
    physical progress. Reopen through the coupled HC-DU-011 + HC-DU-022 object: label-invariant
    order-first growth with feedback and an endogenously generated dimensional memory scale,
    followed by a causal response/noise action and common-past spectrum.
  channels:
  - id: '1.1'
    title: The tachyon-transducer
    scope: >-
      Source action -> tachyonic record-count roll (N=e^{4p}) -> record-accretion -> DE
      sign+magnitude+arrow as one object; the roll<->accretion computation; the volume->Lambda
      link (test sigma.Tr-ln-G from the Bianconi habitat); the tachyon centrality past W157.
    grade: >-
      SUPERSEDED as a BUILD target (2026-07-22 reprioritization): the becoming-core is now a
      CONDITIONAL-THEOREM (source-is-observer — genuine becoming requires exactly one external bit σ, by
      Kleene; a fully source-internal mint is a quine). Lane-1 priority is to PROVE + position it, not
      keep building the source. See strategic_reprioritization.
    flip_witness_target: >-
      (wave-2, 2026-07-21) The D-FORK flip-witness is now PRICED to a hard spec: a source action
      whose flow ISSUES new mode content — grows ker(Γ) — non-absorbingly (not one-shot) and
      source-internally (no external bit, no completed oracle), carrying a sourced non-additive
      count. The mirror-sector condensate is ABSORBED (fixed-H/Bogoliubov; build+kill converge).
      Full requirements rubric: explorations/flip-witness-algebra-requirements-2026-07-21.md. The
      static GU substrate structurally FORBIDS the growth (fixed ker(Γ) of fixed Cl(9,5)) — so the
      target needs an extension of GU or a non-GU substrate. This one object unlocks becoming, the
      DE-amplitude VALUE, measurement's Born+single-outcome, and the low-entropy selection at once.
      See wave2-flagship-convergence-synthesis-2026-07-21.md.
  - id: '1.2'
    title: Shared B5 source action (with P2C)
    scope: >-
      The source-action construction (P2C 9-item obligations spec as an acceptance rubric,
      re-checked here); the return arrow (the named unbuilt piece); the O-b `sorry` discharge.
  - id: '1.3'
    title: The native DE amplitude — THE LANE-1 ANCHOR
    anchor: true
    scope: >-
      Does Lambda~1/sqrt(N) fall out natively? phi = 1/(3 Omega_Lambda)^2 from the (9,5)/gimmel
      DeWitt-fiber measure + a native count, beating the Sorkin-import and the de-Sitter-relabel.
    grade: >-
      Exponent native/consilient (BANKED); O(1) coefficient imported/tuned (OPEN, R6b). This channel
      is the lane's North-Star anchor as of 2026-07-21 — see lead_bet.anchor for the honest standing
      and the live sourcing target.
  - id: '1.4'
    title: Covariant cosmology and observational confrontation
    scope: >-
      Determine whether Λ=c/√N and the proposed record-accretion law admit a Bianchi-compatible
      stress/interaction completion, accelerated expansion, stable background/perturbative behavior,
      and an observationally viable H(z), q(z), w_eff(z), Ω_Λ(z) and growth history without importing
      an arbitrary function or target. SWING-DU-COV-01 closes the conserved accelerating background
      leg. SWING-DU-COV-02 constructs and kills the strongest local covariant lift. SWING-DU-CMF-01
      separately recomputes the literal causal-past count, a bi-wave memory and an order-first
      martingale: nonlocality escapes the local cone, but the scale-free backgrounds track or fail
      to accelerate and the stochastic branch fails early-RMS/sign/de-Sitter controls.
    grade: >-
      TWO SCOPED VERDICTS: VIABLE_ONLY_AS_LAMBDA_LIMIT for the constant-kappa local lift;
      CAUSAL_ESCAPE_TRACKER_FAIL for the literal/scale-free causal-memory tournament. Exact retarded
      background, metric-null comparator, full finite history, common-past covariance and complete-Q
      phenomenology exist. No order-first source law, generated memory scale, CTP/noise action,
      finite-k feedback clearance or likelihood. Generated-scale/UV completions remain OPEN models,
      not rescues already earned.
  - id: '1.5'
    title: Theory kernel, typed objects and low-energy recovery
    scope: >-
      Build the minimum complete theory passport (state space, action, symmetries, observables,
      quantization, constraints, limits and predictions); construct explicit typed maps among the
      several N objects; build the HC-DU-011 + HC-DU-022 order-first causal scale generator; test
      CSG/AQFT/index/BV-BRST consistency, radiative stability, and recovery of GR plus the Standard
      Model. Work packages WP-02/WP-03/WP-04 in the fifty-persona register.
    grade: OPEN / foundational construction and audit
