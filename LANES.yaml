lane_contract_version: '1.0'
manifest_revision: 4
owner:
  owner_id: dynamic-unity
  display_name: Dynamic Unity
  scope_type: repository
  charter_ref: README.md
  governance_refs:
  - AGENTS.md
  - CONNECTIONS.md
  authoritative_state_refs:
  - README.md
  - LANES.yaml
lane_design_note: >-
  Lanes are organized by JOB / MODE of research, not by a verification pipeline. There is
  deliberately NO standing verification-gate lane: honesty (grade what you actually have; don't
  fool yourself) is a per-lane practice, and the known challenges/adversaries are TERRAIN to beat,
  not gates — most are class-relative no-go's this program has a history of getting around (see
  lab/process/known-challenges-and-adversaries.md). The lean is toward the frontier and ambition.
lanes:
- id: '1'
  label: Lane 1
  ordinal: 1
  kind: progress
  title: Targeted hypothesis pursuit
  north_star: true
  purpose: >-
    Go directly after specific, named flagship hypotheses and drive each toward a verdict — the
    high-exploit / North-Star work. The directed lane: pick the biggest bets and push them hard.
  purpose_type: north_star
  lead_bet: >-
    The single MOST IMPORTANT thing in this lane is the NATIVE Λ~1/√N scaling of the record count N
    (channel 1.3) — the one genuinely-native, cross-route-consilient result. The tachyon-transducer
    (1.1) and the B5 source action (1.2) are routes toward SOURCING its still-imported O(1)
    coefficient. Broad in admission, anchored in priority.
  anchor:
    name: Λ~1/√N — the native scaling of the record count N (the Lane-1 North-Star anchor)
    elevated: '2026-07-21 (Joe direct chat)'
    why: >-
      It converts the worst fine-tuning in physics — Λ ~ 10^-120 in Planck units — into "N is large"
      (N = spacetime 4-volume in Planck units ~ 10^240; 1/√(10^240) = 10^-120): the cosmological-
      constant fine-tuning DISSOLVES into a finite-N statistical (central-limit / LLN-residual)
      fluctuation. It is the one place the program already turns a notorious impossibility into
      arithmetic, and the object all other threads converge on — the record count N seen four ways:
      its fluctuation is dark energy, its growth is becoming (the roll), its finality-structure is
      measurement, its causal order is spacetime.
    honest_standing: >-
      BANKED: the ½ EXPONENT is native and consilient (two wave-1 routes — DeWitt-fiber + Bianconi-
      entropy — plus Sorkin's causal-set fluctuation). OPEN: the O(1) COEFFICIENT is NOT yet sourced.
      The R1-R7 test wave (2026-07-21) sharpened why: R6b — the Λ↔N loop pins Ω_Λ only via one tuned
      knob (generic O(1) ~0.7-0.8; the 120-order fine-tuning is GONE, but 0.68 needs tuning); R6a — a
      set-point-free SOC controller SOURCES the exponent + critical point (the "must import a set-point"
      wall falls) but is SCALE-FREE, so it cannot output a magnitude, and non-additivity (what a sourced
      count needs) is in TENSION with a self-averaging 1/√N (non-additive gives a heavy-tailed 3/2; 1/√N
      returns only under additive counting = the wave-1 import). The SIGN stays the external σ bit. Do
      NOT state "Λ~1/√N is derived" flatly — the exponent is, the value is not.
    live_target: >-
      Source the O(1) coefficient via a SECOND, self-sourced scale-fixing ingredient. Concrete
      candidate: dimensional-transmutation-style scale-generation tied to the D-spectral gap (QCD
      precedent — a scale-free theory self-generates ΛQCD with no imported scale). This is downstream
      of the same B5 source-action / source-internal-MINT bottleneck all five R-tests converge on
      (rtest-wave-synthesis-2026-07-21.md); type-III (modular/KMS) source-selection and the neural-
      scaling spectral-dimension lead are the adjacent routes to the same sourced scale.
  priority_guard: >-
    Before more coefficient-sourcing work is treated as progress on a physical dark-energy model,
    Channel 1.4 must test the current Λ↔N closure as a covariantly conserved, accelerating cosmology.
    R6b's own late-time tracker has p=2/3, while its current Friedmann closure does not supply the
    Bianchi/continuity exchange required by a time-varying Λ. An order-one Ω_Λ without conservation
    and acceleration is not yet a dark-energy solution. Source panel and pre-registered swing:
    explorations/50-persona-blind-spot-register-and-priority-map-2026-07-21.md.
  channels:
  - id: '1.1'
    title: The tachyon-transducer
    scope: >-
      Source action -> tachyonic record-count roll (N=e^{4p}) -> record-accretion -> DE
      sign+magnitude+arrow as one object; the roll<->accretion computation; the volume->Lambda
      link (test sigma.Tr-ln-G from the Bianconi habitat); the tachyon centrality past W157.
    grade: unbuilt / B5-gated / conjecture — the flagship
    flip_witness_target: >-
      (wave-2, 2026-07-21) The D-FORK flip-witness is now PRICED to a hard spec: a source action
      whose flow ISSUES new mode content — grows ker(Γ) — non-absorbingly (not one-shot) and
      source-internally (no external bit, no completed oracle), carrying a sourced non-additive
      count. The mirror-sector condensate is ABSORBED (fixed-H/Bogoliubov; build+kill converge).
      Full requirements rubric: explorations/flip-witness-algebra-requirements-2026-07-21.md. The
      static GU substrate structurally FORBIDS the growth (fixed ker(Γ) of fixed Cl(9,5)) — so the
      target needs an extension of GU or a non-GU substrate. This one object unlocks becoming, the
      DE-amplitude VALUE, measurement's Born+single-outcome, and the low-entropy selection at once.
      See wave2-flagship-convergence-synthesis-2026-07-21.md.
  - id: '1.2'
    title: Shared B5 source action (with P2C)
    scope: >-
      The source-action construction (P2C 9-item obligations spec as an acceptance rubric,
      re-checked here); the return arrow (the named unbuilt piece); the O-b `sorry` discharge.
  - id: '1.3'
    title: The native DE amplitude — THE LANE-1 ANCHOR
    anchor: true
    scope: >-
      Does Lambda~1/sqrt(N) fall out natively? phi = 1/(3 Omega_Lambda)^2 from the (9,5)/gimmel
      DeWitt-fiber measure + a native count, beating the Sorkin-import and the de-Sitter-relabel.
    grade: >-
      Exponent native/consilient (BANKED); O(1) coefficient imported/tuned (OPEN, R6b). This channel
      is the lane's North-Star anchor as of 2026-07-21 — see lead_bet.anchor for the honest standing
      and the live sourcing target.
  - id: '1.4'
    title: Covariant cosmology and observational confrontation
    scope: >-
      Determine whether Λ=c/√N and the proposed record-accretion law admit a Bianchi-compatible
      stress/interaction completion, accelerated expansion, stable background/perturbative behavior,
      and an observationally viable H(z), q(z), w_eff(z), Ω_Λ(z) and growth history without importing
      an arbitrary function or target. First swing: SWING-DU-COV-01 in the fifty-persona register.
    grade: OPEN / P0 validity check on the current R6b loop
  - id: '1.5'
    title: Theory kernel, typed objects and low-energy recovery
    scope: >-
      Build the minimum complete theory passport (state space, action, symmetries, observables,
      quantization, constraints, limits and predictions); construct explicit typed maps among the
      several N objects; test CSG/AQFT/index/BV-BRST consistency, radiative stability, and recovery
      of GR plus the Standard Model. Work packages WP-02/WP-03/WP-04 in the fifty-persona register.
    grade: OPEN / foundational construction and audit
- id: '2'
  label: Lane 2
  ordinal: 2
  kind: progress
  title: Non-derivation generation & testing
  north_star: false
  purpose: >-
    Generate and test candidate unifications, reframings, and structures by ALL legitimate
    non-derivation means — abduction, synthesis, reframing, analogy-as-structure, making a static
    picture dynamic. Derivation is NOT assumed to be the standard. The divergent, heterodox engine
    that feeds Lane 1 with new bets and cheap discriminating tests.
  purpose_type: independent_progress
  channels:
  - id: '2.1'
    title: The dynamic tension-reframe sweep
    scope: >-
      Run the GU tension ledger through "which tensions reframe or resolve when the system is made
      dynamic?" — the systematic engine.
  - id: '2.2'
    title: Candidate-unification generation
    scope: >-
      Abduce / synthesize / reframe new candidate unifying structures (including non-GU frames);
      give each a cheap discriminating test; promote survivors to Lane 1.
  - id: '2.3'
    title: GU ablation and rival-frame tournament
    scope: >-
      Remove GU from each candidate argument to measure its unique contribution, then compare DU
      against live causal-set, unimodular, sequestering and other unification frames with one common
      recovery, prediction, complexity and evidence-independence scorecard. Work package WP-07.
  - id: '2.4'
    title: Open-endedness, emergence and network alternatives
    scope: >-
      Rework the source-internal-MINT search with non-circular novelty measures, RG/emergence,
      evolutionary open-endedness, network topology and physically explicit selection dynamics;
      distinguish operational novelty from literal fundamental algebra growth. Work package WP-08.
  - id: open
    title: (open)
    scope: New program-native candidates admitted as they earn an object + a cheap test.
- id: '3'
  label: Lane 3
  ordinal: 3
  kind: progress
  title: Persona parallel progress
  north_star: false
  purpose: >-
    A standing cross-pollinating persona WORK swarm: each persona seated from the DU
    Dynamic-Physics board (persona-register.md) holds a channel and works to progress the project
    as far as it can from its own lens. This is parallel work, not deliberation.
  purpose_type: independent_progress
  operating_rule: >-
    Each round: (1) every seated persona advances the project from its lens and records what it
    accomplished; (2) before the next round, each persona reads the others' progress; (3) each
    reorients — continue the same thread, or pivot to something more promising given what the
    others found. Personas are lenses; their outputs are re-verified, never banked on persona
    authority. Distinct from the "personas always inline" rule, which governs council DELIBERATION;
    this lane is parallel work.
  panel_backlog_ref: explorations/50-persona-blind-spot-register-and-priority-map-2026-07-21.md
  preservation_rule: >-
    The fifty-persona register's P01-A through P50-B records are the lossless source backlog for this
    panel. Work packages and syntheses may route or combine them but never erase an individual item;
    each item receives its own evidence-backed disposition before it is considered closed.
  channels:
  - id: '3.x'
    title: One channel per seated persona
    scope: >-
      Seats drawn (by reference, not forked — ISSUE-0030) from the DU Dynamic-Physics board:
      Mathematical Physicist, Differential Geometer, Dynamical Systems, Symbolic Dynamics, Spin
      Geometry, Index Theory, Gauge Theory, GU Specialist, Constructor/Assembly/Open-endedness,
      Metrology-Invariance, Order-Domain, Model-theorist, Type-theorist, plus the new tachyonic /
      mirror-sector / B5-source-action seats.
- id: '4'
  label: Lane 4
  ordinal: 4
  kind: progress
  title: Prediction, hardening & Drafting-Factory seeding
  north_star: false
  purpose: >-
    Own Dynamic Unity's UPSTREAM end of the Drafting-Factory seam — and only that. Responsible
    for: (1) extracting and freezing falsifiable predictions; (2) scanning the other lanes (1/2/3)
    to IDENTIFY paper- and prediction-shaped candidates; (3) SEEDING them to the Drafting Factory
    as well-formed seeds via the factory mailbox; (4) HARDENING the research and the papers —
    proactively whenever this lane judges it warranted, and on the factory's hardening requests.
    NOT responsible for producing the final paper, for tracking publication-readiness, or for
    getting Joe to publish: the Drafting Factory owns paper production and Joe owns posting. Hand
    off a hardened seed/return and stop — no redundant publishing tracking lives here.
  purpose_type: supporting_progress
  channels:
  - id: '4.1'
    title: Prediction extraction
    scope: >-
      Extract, freeze, and expose falsifiable predictions: the DE-sign no-crossing; the recovered
      TeV mirror + DE/Planck-ratio; the parity co-variance leg — carried with their blockers. TaF
      bridge units-guard (rate^2-to-rate^2) applied as a sanity check.
  - id: '4.2'
    title: Candidate identification & seeding to the Drafting Factory
    scope: >-
      Watch Lanes 1/2/3 for paper- and prediction-shaped results; prepare each as a well-formed
      SEED (working title, source pointers, possible contribution + audience, current grade + open
      conditions, obvious overlaps) and route it to the factory mailbox. A good seed, not a
      finished paper.
  - id: '4.3'
    title: Hardening (research + papers; proactive + on factory request)
    scope: >-
      Harden the research and the papers whenever this lane independently sees it should be, AND
      respond to the factory's hardening requests with a frozen, honest-graded return of exactly
      the requested gap. Hand the hardened seed/return to the factory; do not track its publication.
  - id: '4.4'
    title: Independent verification, evidence dependency and reproducibility
    scope: >-
      Run clean-room or blinded replications; maintain fixed/withheld challenge sets; distinguish
      common-source support from independent consilience; require uncertainty, convergence and
      portable result provenance before a claim is hardened or seeded. Work package WP-06.
- id: A
  label: Lane A
  letter: A
  kind: stewardship
  title: Stewardship
  north_star: false
  purpose: >-
    Governance; the sovereign self-verification duty; the persona convention (inline for
    deliberation; the register is a pointer per ISSUE-0030); custody of the known-challenges /
    adversaries register (terrain to beat, NOT gates); cross-repo ingest/share hygiene; lane
    hygiene.
  purpose_type: integrated_stewardship
  channels:
  - id: A.1
    title: Claim, banking and type integrity
    scope: >-
      Maintain stable claim IDs, grades, promotion authority, supersession/failure state and the
      typed-object map; reconcile stale Lane-3 banking references without silently changing
      constitutional or charter language. Work packages WP-02 and WP-06.
  - id: A.2
    title: Provenance, reproducibility and durable reuse
    scope: >-
      Maintain source/version/commit provenance, runnable environments and artifact metadata,
      bibliography, legibility, release/deprecation history and licensing/attribution hygiene.
      Work packages WP-06 and WP-10.
  - id: A.3
    title: Portfolio and panel custody
    scope: >-
      Preserve the lossless persona backlog; calibrate forecasts and stop-losses; evaluate agent
      research methods against baselines; manage GU/non-GU/null search allocation without converting
      persona authority into evidence. Work package WP-09.
discovery:
  kind: lane_less
  title: Discovery
  purpose: >-
    Truly-wild, coherence-first ideation feeding Lane 2; promoted into a lane only when a
    candidate binds to a program-native object with a cheap discriminating test.
special_rules:
- id: no-standing-verification-gate
  note: >-
    Deliberately NO standing verification-gate lane. Honesty is a per-lane practice; the known
    challenges are terrain, not blockers; the lean is toward the frontier. Class-relative no-go's
    are challenges to beat, not walls — this program's history is getting around them.
- id: persona-swarm-vs-inline-council
  note: >-
    Lane 3 (per-persona-channel WORK swarm) is distinct from the standing "personas always inline"
    rule, which governs council DELIBERATION. Deliberation stays one-worker; Lane 3 is parallel work.
- id: future-non-gu-lane
  note: >-
    The broad Purpose leaves room for a FUTURE lane pursuing unification without assuming GU at
    all; Lane 2 already admits non-GU candidate frames.
