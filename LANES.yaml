    flip-witness' is SUPERSEDED: source-is-observer is a CONDITIONAL-THEOREM — genuine becoming requires
    exactly one external bit (sigma), by Kleene; a fully source-internal mint is a quine. Lane-1
    priority: PROVE it rigorously + position novelty (Breuer/Rovelli/Lawvere). See
    record-immutability-forces-external-involution + self-authoring-dirac-synthesis."
  - "(2) DE coefficient: stop treating 'source it' as the goal. Every route is 'exponent native, value
    imported'; the fifty-persona P19 questions whether an O(1) coefficient is even a fine-tuning; COV-02
    constrained the local lift. RESOLVE P19 + the 1.4 validity gate FIRST -- both parallel-flow-owned."
  - "(3) ELEVATE Lane 4 hardening/productization of DU-OWNED products: the covariant-finality
    dissolution, the SOURCE-IS-OBSERVER theorem (DU's dynamic result, which RESTS ON but does not own
