lanes:
- id: '1'
  label: Lane 1
  ordinal: 1
  kind: progress
  title: Targeted hypothesis pursuit
  north_star: true
  purpose: >-
    Go directly after specific, named flagship hypotheses and drive each toward a verdict — the
    high-exploit / North-Star work. The directed lane: pick the biggest bets and push them hard.
  purpose_type: north_star
  lead_bet: >-
    The single MOST IMPORTANT question in this lane is when Λ~1/√N is physically selected from the
    record count N (channel 1.3). The half-power is native within the additive/summable-correlation
    class, not universal; its observable identification, extensive-mean subtraction, and O(1)
    coefficient remain open. Broad in admission, anchored in priority.
  anchor:
    name: Λ~1/√N — the native scaling of the record count N (the Lane-1 North-Star anchor)
    elevated: '2026-07-21 (Joe direct chat)'
    why: >-
      It converts the worst fine-tuning in physics — Λ ~ 10^-120 in Planck units — into "N is large"
      (N = spacetime 4-volume in Planck units ~ 10^240; 1/√(10^240) = 10^-120): the cosmological-
      constant fine-tuning DISSOLVES into a finite-N statistical (central-limit / LLN-residual)
      fluctuation. It is the one place the program already turns a notorious impossibility into
      arithmetic, and the object all other threads converge on — the record count N seen four ways:
      its fluctuation is dark energy, its growth is becoming (the roll), its finality-structure is
      measurement, its causal order is spacetime.
    honest_standing: >-
      BANKED AT CLASS-CONDITIONAL GRADE: the ½ EXPONENT is native for additive, finite-variance,
      sufficiently mixing fluctuations. The 2026-07-23 robustness tournament shows it is not forced
      by extensivity alone: long-range correlations give a different exponent and a global mode
      gives no suppression. The Bianconi, learning, and Sorkin readings therefore share a CLT-class
      mechanism and are not fully independent consilience. OPEN: the physical correlation class,
      fluctuation-as-Lambda identification, extensive-mean screening, and O(1) coefficient.
      The R1-R7 test wave (2026-07-21) sharpened why: R6b — the Λ↔N loop pins Ω_Λ only via one tuned
      knob (generic O(1) ~0.7-0.8; the 120-order fine-tuning is GONE, but 0.68 needs tuning); R6a — a
      set-point-free SOC controller SOURCES the exponent + critical point (the "must import a set-point"
      wall falls) but is SCALE-FREE, so it cannot output a magnitude, and non-additivity (what a sourced
      count needs) is in TENSION with a self-averaging 1/√N (non-additive gives a heavy-tailed 3/2;
      1/√N returns only under additive/mixing counting). The sign may be supplied conditionally, but
      GU's current operator bridge does not prove its physical externality or sigma=w1. Do NOT state
      "Λ~1/√N is derived" flatly.
    live_target: >-
      SWING-DU-PHY-02 consumed the bounded physical-influence move: live Bianconi and record
      score-energy objects exist, but no functional selector or nonzero physical scale was found.
      Reopen that branch only through an independent held-out response plus a unit-bearing observable
      map. The next major North-Star construction is the coupled HC-DU-011 + HC-DU-022 order-first
      causal scale generator: label-invariant growth with feedback and an endogenously generated
      dimensional memory scale. No further coefficient fitting, proxy proliferation, normalized-
      profile work, or generic source search counts as progress.
  priority_guard: >-
    SWING-DU-COV-02 kills the strongest local constant-kappa lift except at the constant-Lambda
    limit: every accelerating fixed point has c_N^2=3 Omega_V*>1. SWING-DU-CMF-01 then executes the
    class-relative escape rather than globalizing that no-go. Literal causal-past volume, a
    metric-null bi-wave proxy and an order-first signed martingale are retarded and do not inherit
    the local superluminal characteristic. They fail one level deeper: every built scale-free
    positive memory tracks radiation/matter or does not accelerate; late calibration makes the
    early fraction order one; the raw martingale is too noisy early, rarely preserves a positive
    sign, and has no stationary de Sitter limit. Outcome: CAUSAL_ESCAPE_TRACKER_FAIL. A fitted
    offset/window is REIMPORTS_COSMIC_CLOCK. Further coefficient or kernel tuning does not count as
    physical progress. Reopen through the coupled HC-DU-011 + HC-DU-022 object: label-invariant
    order-first growth with feedback and an endogenously generated dimensional memory scale,
    followed by a causal response/noise action and common-past spectrum.
  channels:
  - id: '1.1'
    title: The tachyon-transducer
    scope: >-
      Source action -> tachyonic record-count roll (N=e^{4p}) -> record-accretion -> DE
      sign+magnitude+arrow as one object; the roll<->accretion computation; the volume->Lambda
      link (test sigma.Tr-ln-G from the Bianconi habitat); the tachyon centrality past W157.
    grade: >-
      REBASED 2026-07-24: the prior source-is-observer / exactly-one-external-bit theorem priority
      depended on GU's superseded operator-domain inference and is not current. The subsequent
      completion/abduction and physical-influence swings are complete; neither selected a source,
      mobility, functional, or physical scale. Source/observer constructions remain admissible
      conditional exploration, but the active major build is the HC-DU-011 + HC-DU-022 order-first
      causal scale generator named in Lane 1.5.
    flip_witness_target: >-
      (wave-2, 2026-07-21) The D-FORK flip-witness is now PRICED to a hard spec: a source action
      whose flow ISSUES new mode content — grows ker(Γ) — non-absorbingly (not one-shot) and
      source-internally (no external bit, no completed oracle), carrying a sourced non-additive
      count. The mirror-sector condensate is ABSORBED (fixed-H/Bogoliubov; build+kill converge).
      Full requirements rubric: explorations/flip-witness-algebra-requirements-2026-07-21.md. The
      static GU substrate structurally FORBIDS the growth (fixed ker(Γ) of fixed Cl(9,5)) — so the
      target needs an extension of GU or a non-GU substrate. This one object unlocks becoming, the
      DE-amplitude VALUE, measurement's Born+single-outcome, and the low-entropy selection at once.
      See wave2-flagship-convergence-synthesis-2026-07-21.md.
  - id: '1.2'
    title: Shared B5 source action (with P2C)
    scope: >-
      The source-action construction (P2C 9-item obligations spec as an acceptance rubric,
      re-checked here); the return arrow (the named unbuilt piece); the O-b `sorry` discharge.
  - id: '1.3'
    title: The native DE amplitude — THE LANE-1 ANCHOR
    anchor: true
    scope: >-
      Does Lambda~1/sqrt(N) fall out natively? phi = 1/(3 Omega_Lambda)^2 from the (9,5)/gimmel
      DeWitt-fiber measure + a native count, beating the Sorkin-import and the de-Sitter-relabel.
    grade: >-
      HALF-POWER BANKED ONLY AT ADDITIVE/SUMMABLE-CORRELATION CLASS GRADE; physical correlation
      selection, observable identification, extensive-mean screening, and O(1) coefficient remain
      OPEN. The Bianconi robustness pass reduces the independence of the existing CLT-based
