  rev3_note: >-
    2026-07-21 (Joe direct chat): elevated Λ~1/√N to the explicit Lane-1 North-Star ANCHOR (the most
    important thing in Lane 1) — see lanes[1].anchor and channel 1.3. Scope: Lane-1 priority only; the
    repo Purpose is unchanged. No lane added/removed; within-shape content update.
  rev4_note: >-
