lane_contract_version: '1.0'
manifest_revision: 1
owner:
  owner_id: dynamic-unity
  display_name: Dynamic Unity
  scope_type: repository
  charter_ref: README.md
  governance_refs:
  - AGENTS.md
  - CONNECTIONS.md
  authoritative_state_refs:
  - README.md
  - LANES.yaml
lanes:
- id: '1'
  label: Lane 1
  ordinal: 1
  kind: progress
  title: Dynamics beyond the static GU picture
  north_star: true
  purpose: >-
    Given that the bit (sigma) and the trit (tau) can be supplied in a way that makes the
    STATIC GU picture coherent, determine what DYNAMICS are needed to make a clearer, more
    complete picture beyond it. GU-anchored by design: takes the static picture as the working
    substrate and asks what dynamics extend it. Default-skeptical; central claims OPEN.
  purpose_type: north_star
  lead_bet: >-
    Broad in admission, focused in priority — the B5 source action to a natively-derived
    dark-energy amplitude, the assessment's one bankable joint.
  channels:
  - id: '1.1'
    title: The tachyon-transducer
    role: flagship dynamic reframe
    scope: >-
      Source action to tachyonic record-count roll (N = e^{4p}) to record-accretion to
      DE sign+magnitude+arrow as one object; the roll<->accretion computation; the
      volume->Lambda link; the compactifying mirror-sector vacuum (W224 gap); the tachyon's
      centrality re-derived past the W157 coincidence.
    grade: unbuilt / B5-gated; roll<->accretion is a conjecture; centrality is coincidence-grade (W157)
  - id: '1.2'
    title: The dynamic tension-reframe sweep
    role: the program's systematic engine
    scope: >-
      Take the GU tension ledger (the ~20 inherited tensions plus the resolved cluster) and
      systematically test which tensions reframe or resolve when the system is made DYNAMIC —
      the generalization of the transducer (which reframes the dark-energy tension) to every
      tension. The sigma-council, tau-council, and tachyon-as-DE-rolling are its first entries;
      the sweep asks, tension by tension, whether the dynamics reach where the static discrete
      data provably could not (measurement, hierarchy, confinement, the magnitudes...).
  - id: '1.3'
    title: Shared B5 source action (with P2C)
    role: the blocked spine both channels ride on
    scope: >-
      The B5 source-action construction consumed from P2C when delivered, re-checked for fit
      here rather than assumed; the good-stable grading it must supply.
  - id: open
    title: (open)
    role: admission slot
    scope: >-
      Additional unification-candidate channels admitted from Discovery as they earn a
      program-native object plus a kill test.
- id: '2'
  label: Lane 2
  ordinal: 2
  kind: progress
  title: Prediction extraction
  north_star: false
  purpose: Turn candidate cores into exposed, falsifiable predictions.
  purpose_type: independent_progress
  channels:
  - id: '2.1'
    title: 'DE amplitude via 1/sqrt(N)'
    scope: The native-derivation test of phi = 1/(3*Omega_Lambda)^2 — the distinctness bank.
  - id: '2.2'
    title: Recovered predictions
    scope: >-
      The TeV mirror state (ghost-vs-physical fork + reopen conditions) and the DE/Planck
      ratio, carried as live candidates with blockers.
  - id: '2.3'
    title: Cross-domain co-variance
    scope: The parity leg as a candidate second observable — proposal-grade, pursued not counted.
- id: '3'
  label: Lane 3
  ordinal: 3
  kind: progress
  title: Result hardening / publication readiness
  north_star: false
  purpose: >-
    Adversarial verification, machine probes with real-falsifier positive controls, grade
    labels, rollback conditions, VERIFICATION-style honesty maps. Terminal state = a Joe-review
    draft; Joe publishes.
  purpose_type: supporting_progress
- id: A
  label: Lane A
  letter: A
  kind: stewardship
  title: Stewardship
  north_star: false
  purpose: >-
    Governance, the self-checking duty, the anti-crank/method discipline, the parsimony
    ledger plus its rigged control, cross-repo ingest/share hygiene, lane hygiene.
  purpose_type: integrated_stewardship
discovery:
  kind: lane_less
  title: Discovery
  purpose: >-
    Divergent, coherence-first ideation across the whole moonshot (W155-style sweeps);
    promoted into a numbered lane only when a candidate binds to a program-native object with
    a concrete kill/confirm test.
special_rules:
- id: future-non-gu-lane
  note: >-
    The broad Purpose leaves room for a FUTURE lane that pursues unification without assuming
    GU at all. Lane 1 is GU-anchored by design and is not the program's only possible frame.
provenance:
  revision: 1
  status: founding
  created: '2026-07-21'
  approved_by: Joe direct chat via coordinator, 2026-07-21 (approved_charter rev. 5)
