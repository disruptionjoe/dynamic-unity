      finite-k feedback clearance or likelihood. Generated-scale/UV completions remain OPEN models,
      not rescues already earned.
  - id: '1.5'
    title: Theory kernel, typed objects and low-energy recovery
    scope: >-
      Build the minimum complete theory passport (state space, action, symmetries, observables,
      quantization, constraints, limits and predictions); construct explicit typed maps among the
      several N objects; build the HC-DU-011 + HC-DU-022 order-first causal scale generator; test
      CSG/AQFT/index/BV-BRST consistency, radiative stability, and recovery of GR plus the Standard
      Model. Work packages WP-02/WP-03/WP-04 in the fifty-persona register.
    grade: OPEN / foundational construction and audit
