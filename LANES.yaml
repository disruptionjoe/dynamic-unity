  deliberately NO standing verification-gate lane: honesty (grade what you actually have; don't
  fool yourself) is a per-lane practice, and the known challenges/adversaries are TERRAIN to beat,
  not gates — most are class-relative no-go's this program has a history of getting around (see
  lab/process/known-challenges-and-adversaries.md). The lean is toward the frontier and ambition.
